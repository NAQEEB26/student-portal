<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Student Portal</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body>
    <div id="app">
        <!-- Navigation will be loaded here -->
        <div id="navigation-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Reports & Analytics</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="generateReport()">
                        <i class="icon-download"></i> Generate Report
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="cards-grid">
                    <div class="card">
                        <div class="card-header">
                            <h3>Academic Reports</h3>
                        </div>
                        <div class="card-body">
                            <div id="academicReports">
                                <!-- Academic reports will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Financial Reports</h3>
                        </div>
                        <div class="card-body">
                            <div id="financialReports">
                                <!-- Financial reports will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Analytics Dashboard</h3>
                        </div>
                        <div class="card-body">
                            <div id="analyticsCharts">
                                <!-- Analytics charts will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Report Modal -->
        <div id="reportModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Generate Report</h3>
                    <button class="modal-close" onclick="hideReportModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="reportOptions">
                        <!-- Report options will be loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/supabase-integration.js"></script>
    <script src="../assets/js/frontend-integration.js"></script>
    <script>
        // Initialize reports module
        document.addEventListener('DOMContentLoaded', function () {
            if (window.StudentPortalIntegration) {
                window.StudentPortalIntegration.initializeModule('reports');
            }
        });

        function generateReport() {
            document.getElementById('reportModal').style.display = 'block';
        }

        function hideReportModal() {
            document.getElementById('reportModal').style.display = 'none';
        }
    </script>
</body>

</html>
