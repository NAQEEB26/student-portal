<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CampusFlow</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/id-card.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Sidebar Header -->
            <div class="sidebar-header">
                <a href="../index.html" class="sidebar-brand">
                    <i class="fas fa-graduation-cap"></i>
                    <span>CampusFlow</span>
                </a>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <!-- User Profile -->
            <div class="sidebar-user" id="sidebarUser">
                <div class="sidebar-user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="sidebar-user-info">
                    <h6 id="userDisplayName">Loading...</h6>
                    <p id="userRole">Loading...</p>
                </div>
            </div>

            <!-- Navigation Menu -->
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Navigation will be populated by JavaScript based on user role -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle d-lg-none" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="topbar-title" id="pageTitle">Dashboard</h1>
                    <nav class="breadcrumb">
                        <ol class="breadcrumb" id="breadcrumb">
                            <li class="breadcrumb-item active">Dashboard</li>
                        </ol>
                    </nav>
                </div>
                <div class="topbar-right">
                    <!-- Search Bar -->
                    <div class="topbar-search d-none d-md-block">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search students, courses..." id="globalSearch">
                    </div>

                    <!-- Notifications -->
                    <div class="notification-dropdown">
                        <button class="notification-btn" data-bs-toggle="dropdown">
                            <i class="fas fa-bell"></i>
                            <span class="notification-badge" id="notificationCount">3</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <h6 class="dropdown-header">Notifications</h6>
                            </li>
                            <li><a class="dropdown-item" href="#">New student registration</a></li>
                            <li><a class="dropdown-item" href="#">Course update required</a></li>
                            <li><a class="dropdown-item" href="#">System maintenance tonight</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-center" href="#">View All</a></li>
                        </ul>
                    </div>

                    <!-- User Dropdown -->
                    <div class="user-dropdown dropdown">
                        <button class="dropdown-toggle" data-bs-toggle="dropdown">
                            <div class="user-avatar" id="userAvatar">A</div>
                            <span class="d-none d-sm-inline" id="topbarUserName">Admin</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="profile.html">
                                    <i class="fas fa-user me-2"></i>Profile
                                </a></li>
                            <li><a class="dropdown-item" href="settings.html">
                                    <i class="fas fa-cog me-2"></i>Settings
                                </a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#" onclick="Auth.logout()">
                                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                                </a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-content" id="dashboardContent">
                <!-- Content will be loaded based on user role and selected view -->
                <div class="d-flex justify-content-center align-items-center" style="height: 200px;">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/students.js"></script>
    <script src="../assets/js/student-modals.js"></script>
    <script src="../assets/js/courses.js"></script>
    <script src="../assets/js/course-modals.js"></script>
    <script src="../assets/js/course-enrollment.js"></script>
    <script src="../assets/js/course-schedule.js"></script>
    <script src="../assets/js/course-reports.js"></script>
    <script src="../assets/js/faculty.js"></script>
    <script src="../assets/js/faculty-modals.js"></script>
    <script src="../assets/js/campus.js"></script>
    <script src="../assets/js/campus-modals.js"></script>
    <script src="../assets/js/building-manager.js"></script>
    <script src="../assets/js/room-manager.js"></script>
    <script src="../assets/js/advanced-filter-system.js"></script>
    <script src="../assets/js/filter-integration.js"></script>
    <script src="../assets/js/rbac-system.js"></script>
    <script src="../assets/js/id-card-generator.js"></script>
    <script src="../assets/js/dashboard.js"></script>

    <script>
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', () => {
            // Check authentication
            if (!Auth.requireAuth()) {
                return;
            }

            // Initialize dashboard
            Dashboard.init();
        });

        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 992) {
                sidebar.classList.toggle('show');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // Close sidebar on mobile when clicking outside
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = e.target.closest('.sidebar-toggle');

            if (window.innerWidth <= 992 && !sidebar.contains(e.target) && !sidebarToggle) {
                sidebar.classList.remove('show');
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth > 992) {
                sidebar.classList.remove('show');
            }
        });
    </script>
</body>

</html>
