<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics - CampusFlow</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body>
    <div id="app">
        <!-- Navigation will be loaded here -->
        <div id="navigation-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Academic Management</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showAcademicModal()">
                        <i class="icon-plus"></i> Academic Records
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="cards-grid">
                    <div class="card">
                        <div class="card-header">
                            <h3>Enrollments</h3>
                        </div>
                        <div class="card-body">
                            <div id="enrollmentsTable">
                                <!-- Enrollments will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Assignments</h3>
                        </div>
                        <div class="card-body">
                            <div id="assignmentsTable">
                                <!-- Assignments will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Attendance</h3>
                        </div>
                        <div class="card-body">
                            <div id="attendanceTable">
                                <!-- Attendance will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Academic Modal -->
        <div id="academicModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Academic Records</h3>
                    <button class="modal-close" onclick="hideAcademicModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="academicContent">
                        <!-- Academic content will be loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/supabase-integration.js"></script>
    <script src="../assets/js/frontend-integration.js"></script>
    <script>
        // Initialize academics module
        document.addEventListener('DOMContentLoaded', function () {
            if (window.StudentPortalIntegration) {
                window.StudentPortalIntegration.initializeModule('academics');
            }
        });

        function showAcademicModal() {
            document.getElementById('academicModal').style.display = 'block';
        }

        function hideAcademicModal() {
            document.getElementById('academicModal').style.display = 'none';
        }
    </script>
</body>

</html>
