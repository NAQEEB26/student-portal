<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Management - CampusFlow</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body>
    <div id="app">
        <!-- Navigation will be loaded here -->
        <div id="navigation-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Faculty Management</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showAddFacultyModal()">
                        <i class="icon-plus"></i> Add New Faculty
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <h3>Faculty Members</h3>
                        <div class="search-filter">
                            <input type="search" id="facultySearch" placeholder="Search faculty...">
                            <select id="departmentFilter">
                                <option value="">All Departments</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="facultyTable">
                            <!-- Faculty table will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Add Faculty Modal -->
        <div id="addFacultyModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add New Faculty</h3>
                    <button class="modal-close" onclick="hideAddFacultyModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="addFacultyForm">
                        <!-- Form fields will be loaded dynamically -->
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/supabase-integration.js"></script>
    <script src="../assets/js/frontend-integration.js"></script>
    <script>
        // Initialize faculty management module
        document.addEventListener('DOMContentLoaded', function () {
            if (window.StudentPortalIntegration) {
                window.StudentPortalIntegration.initializeModule('faculty');
            }
        });

        function showAddFacultyModal() {
            document.getElementById('addFacultyModal').style.display = 'block';
        }

        function hideAddFacultyModal() {
            document.getElementById('addFacultyModal').style.display = 'none';
        }
    </script>
</body>

</html>
