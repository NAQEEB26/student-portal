<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Student Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <div class="mb-3">
                        <i class="fas fa-key fa-2x"></i>
                    </div>
                    <h1>Reset Password</h1>
                    <p>Enter your email to receive reset instructions</p>
                </div>

                <!-- Body -->
                <div class="auth-body">
                    <!-- Forgot Password Form -->
                    <form id="forgotPasswordForm" class="auth-form" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope"></i>
                                Email Address
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="Enter your registered email" required autocomplete="email">
                            </div>
                            <small class="text-muted">
                                We'll send password reset instructions to this email address.
                            </small>
                        </div>

                        <button type="submit" class="auth-btn auth-btn-primary">
                            <i class="fas fa-paper-plane me-2"></i>
                            Send Reset Instructions
                        </button>
                    </form>

                    <!-- Auth Links -->
                    <div class="auth-links">
                        <p class="mb-2">Remember your password?</p>
                        <a href="login.html" class="fw-bold">
                            <i class="fas fa-sign-in-alt me-1"></i>
                            Back to Login
                        </a>
                        <hr class="my-3">
                        <a href="../index.html" class="text-muted">
                            <i class="fas fa-home me-1"></i>
                            Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>

</html>
