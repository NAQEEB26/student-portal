<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <div class="mb-3">
                        <i class="fas fa-graduation-cap fa-2x"></i>
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Sign in to your Student Portal account</p>
                </div>

                <!-- Body -->
                <div class="auth-body">
                    <!-- Backend Selection -->
                    <div class="backend-selection">
                        <h6><i class="fas fa-database me-2"></i>Choose Backend</h6>
                        <div class="backend-options">
                            <div class="backend-option">
                                <input type="radio" id="firebase" name="backend" value="firebase" checked>
                                <label for="firebase">
                                    <i class="fab fa-google me-1"></i>
                                    Firebase
                                </label>
                            </div>
                            <div class="backend-option">
                                <input type="radio" id="supabase" name="backend" value="supabase">
                                <label for="supabase">
                                    <i class="fas fa-database me-1"></i>
                                    Supabase
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="auth-form" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope"></i>
                                Email Address
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="Enter your email" required autocomplete="email">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock"></i>
                                Password
                            </label>
                            <div class="input-group position-relative">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Enter your password" required autocomplete="current-password">
                                <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="remember-me">
                                <input type="checkbox" id="rememberMe" name="rememberMe">
                                <label for="rememberMe">Remember me</label>
                            </div>
                            <a href="forgot-password.html" class="text-decoration-none">
                                Forgot Password?
                            </a>
                        </div>

                        <button type="submit" class="auth-btn auth-btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Sign In
                        </button>
                    </form>

                    <!-- Auth Links -->
                    <div class="auth-links">
                        <p class="mb-2">Don't have an account?</p>
                        <a href="register.html" class="fw-bold">
                            <i class="fas fa-user-plus me-1"></i>
                            Create New Account
                        </a>
                        <hr class="my-3">
                        <a href="../index.html" class="text-muted">
                            <i class="fas fa-home me-1"></i>
                            Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>

    <script>
        // Initialize login page
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            if (Auth.isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Handle backend selection
            const backendRadios = document.querySelectorAll('input[name="backend"]');
            backendRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    StudentPortal.config.backend = e.target.value;
                    Storage.set('selectedBackend', e.target.value);
                    Utils.showToast(`Switched to ${e.target.value.charAt(0).toUpperCase() + e.target.value.slice(1)} backend`, 'info');
                });
            });

            // Load saved backend preference
            const savedBackend = Storage.get('selectedBackend', 'firebase');
            document.querySelector(`input[name="backend"][value="${savedBackend}"]`).checked = true;
            StudentPortal.config.backend = savedBackend;
        });

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.parentNode.querySelector('.password-toggle i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
    </script>
</body>

</html>
