<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions - CampusFlow</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>

<body>
    <div id="app">
        <!-- Navigation will be loaded here -->
        <div id="navigation-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Admissions Management</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showNewApplicationModal()">
                        <i class="icon-plus"></i> New Application
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <h3>Applications</h3>
                        <div class="search-filter">
                            <input type="search" id="applicationSearch" placeholder="Search applications...">
                            <select id="statusFilter">
                                <option value="">All Status</option>
                                <option value="pending">Pending</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="applicationsTable">
                            <!-- Applications table will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- New Application Modal -->
        <div id="newApplicationModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>New Application</h3>
                    <button class="modal-close" onclick="hideNewApplicationModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="newApplicationForm">
                        <!-- Form fields will be loaded dynamically -->
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/supabase-integration.js"></script>
    <script src="../assets/js/frontend-integration.js"></script>
    <script>
        // Initialize admissions module
        document.addEventListener('DOMContentLoaded', function () {
            if (window.StudentPortalIntegration) {
                window.StudentPortalIntegration.initializeModule('admissions');
            }
        });

        function showNewApplicationModal() {
            document.getElementById('newApplicationModal').style.display = 'block';
        }

        function hideNewApplicationModal() {
            document.getElementById('newApplicationModal').style.display = 'none';
        }
    </script>
</body>

</html>
